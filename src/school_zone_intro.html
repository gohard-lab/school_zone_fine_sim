<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스쿨존 인트로 훅 시뮬레이터</title>
    <!-- Tailwind CSS (CDN으로 바로 불러옴) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 대시캠 주사선 효과 */
        .scanlines {
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%), linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
            background-size: 100% 2px, 3px 100%;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-black font-sans overflow-hidden">
    
    <!-- 블랙박스 화면 컨테이너 -->
    <div class="relative w-full max-w-4xl aspect-video bg-gray-900 rounded-lg overflow-hidden border-4 border-gray-800 shadow-2xl">
        
        <!-- 배경: 밤늦은 도로 (이미지 + 어두운 필터 적용) -->
        <div class="absolute inset-0 bg-cover bg-center transition-all duration-1000"
             style="background-image: url('https://images.unsplash.com/photo-1505322022379-7c3353ee6291?auto=format&fit=crop&q=80&w=1200'); filter: brightness(0.3) contrast(1.2) blur(1px);">
        </div>

        <!-- 대시캠 오버레이 텍스트 UI -->
        <div class="absolute inset-0 p-6 flex flex-col justify-between text-white font-mono opacity-80 pointer-events-none">
            <div class="flex justify-between items-start">
                <div class="flex flex-col gap-1">
                    <div class="flex items-center gap-2 text-sm">
                        <div class="w-3 h-3 rounded-full bg-red-600 animate-pulse"></div>
                        <span>REC 04:17:23</span>
                    </div>
                    <div class="text-xs text-gray-400">2026-04-17 PM 11:15:42</div>
                </div>
                <div class="text-right">
                    <div class="text-2xl font-bold tracking-tighter">
                        <span id="speed-display">25</span> <span class="text-sm">km/h</span>
                    </div>
                    <div class="text-[10px] text-gray-400">GPS: 37.5665° N, 126.9780° E</div>
                </div>
            </div>

            <div class="flex justify-between items-end text-[10px] text-gray-500 uppercase tracking-widest">
                <span>Ch.01 - Front View</span>
                <span>School Zone - Protected</span>
            </div>
        </div>

        <!-- 주사선 효과 -->
        <div class="absolute inset-0 pointer-events-none opacity-10 scanlines"></div>

        <!-- 과태료 오버레이 (초기에는 투명하게 숨김 처리) -->
        <div id="fine-overlay" class="absolute inset-0 flex flex-col items-center justify-center transition-all duration-300 opacity-0 scale-90 pointer-events-none">
            
            <!-- 고지서 배경 디자인 -->
            <div class="bg-white/90 backdrop-blur-md p-8 rounded-xl shadow-[0_0_50px_rgba(220,38,38,0.5)] border-t-8 border-red-600 transform -rotate-1 max-w-sm w-full">
                <div class="flex items-center gap-2 text-red-600 mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    <span class="font-black text-xl tracking-tight">과태료 부과 대상</span>
                </div>
                <div class="h-px bg-gray-300 my-4"></div>
                <div class="space-y-4">
                    <div class="flex justify-between text-gray-600 text-sm">
                        <span>위반 항목</span>
                        <span class="font-bold text-gray-900">속도 위반 (20km 이하)</span>
                    </div>
                    <div class="flex justify-between text-gray-600 text-sm">
                        <span>위반 장소</span>
                        <span class="font-bold text-gray-900">어린이 보호구역</span>
                    </div>
                    <div class="mt-6 text-center">
                        <div class="text-gray-400 text-xs uppercase mb-1">Total Fine</div>
                        <div class="text-5xl font-black text-red-600 tracking-tighter">
                            130,000<span class="text-2xl ml-1">원</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 배경에 깔리는 거대한 경고 텍스트 -->
            <div class="absolute -z-10 text-[120px] font-black text-red-600/20 italic select-none">
                FINE 130K
            </div>
        </div>
    </div>

    
    <script>
        // 애니메이션 시퀀스 자바스크립트 제어
        let speedDisplay = document.getElementById('speed-display');
        let fineOverlay = document.getElementById('fine-overlay');
        let timer1, timer2, timer3;

        function startSequence() {
            // 진행 중인 타이머 초기화 및 원래 상태 복구
            clearTimeout(timer1); 
            clearTimeout(timer2); 
            clearTimeout(timer3);
            
            speedDisplay.innerText = "25";
            fineOverlay.classList.replace('opacity-100', 'opacity-0');
            fineOverlay.classList.replace('scale-100', 'scale-90');
            fineOverlay.classList.replace('scale-110', 'scale-90');

            // 1. 1.5초 후: 속도를 31km/h로 증가
            timer1 = setTimeout(() => { 
                speedDisplay.innerText = "31"; 
            }, 1500);

            // 2. 2초 후: 과태료 오버레이 팝업 (살짝 크게 등장)
            timer2 = setTimeout(() => {
                fineOverlay.classList.replace('opacity-0', 'opacity-100');
                fineOverlay.classList.replace('scale-90', 'scale-110');
            }, 2000);

            // 3. 2.3초 후: 원래 크기(scale-100)로 안착 (타격감 연출)
            timer3 = setTimeout(() => {
                fineOverlay.classList.replace('scale-110', 'scale-100');
            }, 2300);
        }

        // 페이지가 열리자마자 자동으로 시퀀스 1회 실행
        window.onload = startSequence;
    </script>
</body>
</html>
